services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: automatic-app-password-creator
    ports:
      - "3000:3000"
    env_file:
      - web/.env
    environment:
      PORT: 3000
    volumes:
      - ./web/output:/app/output
      - ${DB_MGMT_REPO_PATH:-/home/azureuser/Hire-Sense-Backend-Team/repo-csv/db-mgmt}:/mnt/db-mgmt
    shm_size: "1gb"
    restart: unless-stopped
